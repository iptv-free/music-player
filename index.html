<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <style>
        :root { --accent: #1db954; --bg: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 180px; }
        .header { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        #search { width: 85%; padding: 12px; border-radius: 20px; border: 1px solid #ddd; margin-bottom: 10px; }
        .song-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .song-item:hover { background: #f0f0f0; }
        .pagination { display: flex; justify-content: center; gap: 5px; margin: 20px 0; align-items: center; }
        .page-btn { padding: 8px 12px; border: 1px solid #ddd; cursor: pointer; border-radius: 4px; background: #fff; }
        .page-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .pagination span { padding: 0 5px; color: #555; }
        #footer-player { position: fixed; bottom: 0; width: 100%; background: #181818; color: white; padding: 15px; border-radius: 20px 20px 0 0; text-align: center; }
        .progress-container { width: 90%; height: 6px; background: #555; border-radius: 5px; cursor: pointer; margin: 10px auto; }
        #progress { height: 100%; background: var(--accent); width: 0%; border-radius: 5px; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="search" placeholder="🔍 Qidirish..." onkeyup="updateUI()">
    </div>

    <div id="playlist"></div>
    <div id="pagination" class="pagination"></div>

    <div id="footer-player">
        <h4 id="current-title" style="margin:5px; font-size: 14px;">Musiqa tanlang</h4>
        <div class="progress-container" onclick="setProgress(event)">
            <div id="progress"></div>
        </div>
        <div class="controls">
            <span onclick="changeTrack(-1)" style="cursor:pointer">⏮️</span>
            <span id="play-pause" onclick="togglePlay()" style="font-size:30px; cursor:pointer">▶️</span>
            <span onclick="changeTrack(1)" style="cursor:pointer">⏭️</span>
            <input type="range" min="0" max="1" step="0.1" value="1" oninput="audio.volume=this.value" style="width: 50px;">
        </div>
        <audio id="audio"></audio>
    </div>

    <script>
        let allTracks = [], filtered = [], currentIdx = 0, currentPage = 1;
        const audio = document.getElementById('audio');

        async function fetchM3U() {
            const res = await fetch("https://raw.githubusercontent.com/iptv-free/TV/refs/heads/FREE/uzbek.m3u");
            const text = await res.text();
            const lines = text.split('\n');
            
            for (let i = 0; i < lines.length; i++) {
                if(lines[i].startsWith('#EXTINF')) {
                    let rawTitle = lines[i].split(',')[1] || "";
                    let parts = rawTitle.trim().split(' ');
                    
                    // Agar birinchi qism 8 ta belgidan uzun raqam bo'lsa, ID deb hisoblab olib tashlaydi
                    let cleanTitle = (parts[0].length > 8 && !isNaN(parts[0])) ? parts.slice(1).join(' ') : rawTitle;
                    
                    if (lines[i+1]) {
                        allTracks.push({ title: cleanTitle, url: lines[i+1].trim() });
                    }
                }
            }
            updateUI();
        }

        function updateUI() {
            const q = document.getElementById('search').value.toLowerCase();
            filtered = allTracks.filter(t => t.title && t.title.toLowerCase().includes(q));
            renderPage(1);
        }

        function renderPage(page) {
            currentPage = page;
            const list = document.getElementById('playlist');
            list.innerHTML = "";
            const start = (page - 1) * 20;
            const end = start + 20;
            
            filtered.slice(start, end).forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<span>${t.title}</span> <span>▶️</span>`;
                div.onclick = () => play(start + i);
                list.appendChild(div);
            });
            renderPagination();
        }

        function renderPagination() {
            const pag = document.getElementById('pagination');
            pag.innerHTML = "";
            const totalPages = Math.ceil(filtered.length / 20);
            if (totalPages <= 1) return;

            addBtn(1);
            let start = Math.max(2, currentPage - 1);
            let end = Math.min(totalPages - 1, currentPage + 1);

            if (start > 2) pag.appendChild(createSpan("..."));
            for (let i = start; i <= end; i++) addBtn(i);
            if (end < totalPages - 1) pag.appendChild(createSpan("..."));
            if (totalPages > 1) addBtn(totalPages);
        }

        function addBtn(i) {
            const b = document.createElement('button');
            b.className = 'page-btn ' + (i === currentPage ? 'active' : '');
            b.innerText = i;
            b.onclick = function() { renderPage(i); }; 
            document.getElementById('pagination').appendChild(b);
        }

        function createSpan(text) {
            const s = document.createElement('span');
            s.innerText = text;
            return s;
        }

        function play(idx) {
            currentIdx = idx;
            const t = filtered[idx];
            audio.src = t.url;
            document.getElementById('current-title').innerText = t.title;
            audio.play();
            document.getElementById('play-pause').innerText = "⏸️";
        }

        audio.onended = () => changeTrack(1);
        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('play-pause').innerText = "⏸️"; }
            else { audio.pause(); document.getElementById('play-pause').innerText = "▶️"; }
        }
        function setProgress(e) { audio.currentTime = (e.offsetX / e.target.clientWidth) * audio.duration; }
        audio.ontimeupdate = () => { document.getElementById('progress').style.width = (audio.currentTime / audio.duration) * 100 + "%"; };
        function changeTrack(d) { play((currentIdx + d + filtered.length) % filtered.length); }

        fetchM3U();
    </script>
</body>
</html>
