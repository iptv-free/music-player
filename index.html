<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Music Player</title>
    <style>
        :root { --accent: #1db954; --bg: #fff; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 180px; }
        
        .header { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        #search { width: 85%; padding: 12px; border-radius: 20px; border: 1px solid #ddd; margin-bottom: 10px; }
        
        .menu { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .menu-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid var(--accent); background: transparent; cursor: pointer; transition: 0.3s; }
        .menu-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 10px rgba(29, 185, 84, 0.3); }

        .song-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f9f9f9; cursor: pointer; transition: 0.2s; }
        .song-item:hover { background: #f0f0f0; }

        #footer-player { position: fixed; bottom: 0; width: 100%; background: #181818; color: white; padding: 15px; border-radius: 20px 20px 0 0; text-align: center; z-index: 1000; }
        .progress-container { width: 90%; height: 6px; background: #555; border-radius: 5px; cursor: pointer; margin: 10px auto; }
        #progress { height: 100%; background: var(--accent); width: 0%; border-radius: 5px; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; }
        
        .pagination { display: flex; justify-content: center; gap: 5px; margin: 20px 0; }
        .page-btn { padding: 8px 12px; border: 1px solid #ddd; cursor: pointer; border-radius: 5px; transition: 0.2s; }
        .page-btn.active { background: var(--accent); color: white; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="search" placeholder="🔍 Qidirish..." onkeyup="updateUI()">
        <div class="menu">
            <button class="menu-btn active" onclick="setCat('all', this)">Barchasi</button>
            <button class="menu-btn" onclick="setCat('uzb', this)">O'zbek</button>
            <button class="menu-btn" onclick="setCat('for', this)">Xorij</button>
        </div>
    </div>

    <div id="playlist"></div>
    <div id="pagination" class="pagination"></div>

    <div id="footer-player">
        <h4 id="current-title" style="margin:5px; font-size: 14px;">Musiqa tanlang</h4>
        <div class="progress-container" onclick="setProgress(event)">
            <div id="progress"></div>
        </div>
        <div class="controls">
            <span onclick="changeTrack(-1)" style="cursor:pointer">⏮️</span>
            <span id="play-pause" onclick="togglePlay()" style="font-size:30px; cursor:pointer">▶️</span>
            <span onclick="changeTrack(1)" style="cursor:pointer">⏭️</span>
            <span id="repeat-btn" onclick="toggleRepeat()" style="cursor:pointer; font-size: 20px;">🔁</span>
            <input type="range" min="0" max="1" step="0.1" value="1" oninput="audio.volume=this.value" style="width: 50px;">
        </div>
        <audio id="audio"></audio>
    </div>

    <script>
        let allTracks = [], filtered = [], currentIdx = 0, currentPage = 1, currentCat = 'all', isRepeating = false;
        const audio = document.getElementById('audio');

        // M3U fayllarni yuklash
        async function fetchM3U(url, cat) {
            try {
                const res = await fetch(url);
                const text = await res.text();
                text.split('\n').forEach((line, i, arr) => {
                    if(line.startsWith('#EXTINF')) {
                        allTracks.push({ title: line.split(',')[1], url: arr[i+1], cat });
                    }
                });
                updateUI();
            } catch (err) {
                console.error("Xatolik: M3U faylini yuklab bo'lmadi", err);
            }
        }

        function updateUI() {
            const q = document.getElementById('search').value.toLowerCase();
            filtered = allTracks.filter(t => (currentCat === 'all' || t.cat === currentCat) && t.title.toLowerCase().includes(q));
            renderPage(1);
        }

        function renderPage(page) {
            currentPage = page;
            const list = document.getElementById('playlist');
            list.innerHTML = "";
            const start = (page - 1) * 20;
            filtered.slice(start, start + 20).forEach((t, i) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<span>${t.title}</span> <span>▶️</span>`;
                div.onclick = () => play(t, start + i);
                list.appendChild(div);
            });
            renderPag();
        }

        function renderPag() {
            const pag = document.getElementById('pagination');
            pag.innerHTML = "";
            const total = Math.ceil(filtered.length / 20);
            for(let i = Math.max(1, currentPage - 2); i <= Math.min(total, currentPage + 2); i++) {
                const b = document.createElement('button');
                b.className = 'page-btn ' + (i === currentPage ? 'active' : '');
                b.innerText = i;
                b.onclick = () => renderPage(i);
                pag.appendChild(b);
            }
        }

        function play(t, idx) {
            currentIdx = idx;
            audio.src = t.url;
            document.getElementById('current-title').innerText = t.title;
            audio.play().catch(e => console.log("Avtomatik ijro to'xtatildi:", e));
            document.getElementById('play-pause').innerText = "⏸️";
        }

        audio.onended = () => {
            if (isRepeating) { audio.currentTime = 0; audio.play(); }
            else changeTrack(1);
        };

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('play-pause').innerText = "⏸️"; }
            else { audio.pause(); document.getElementById('play-pause').innerText = "▶️"; }
        }

        function toggleRepeat() {
            isRepeating = !isRepeating;
            document.getElementById('repeat-btn').style.color = isRepeating ? "#1db954" : "white";
        }

        function setProgress(e) {
            const width = e.target.clientWidth;
            const clickX = e.offsetX;
            audio.currentTime = (clickX / width) * audio.duration;
        }

        audio.ontimeupdate = () => {
            if(audio.duration) {
                document.getElementById('progress').style.width = (audio.currentTime / audio.duration) * 100 + "%";
            }
        };

        function changeTrack(d) {
            if(filtered.length === 0) return;
            currentIdx = (currentIdx + d + filtered.length) % filtered.length;
            play(filtered[currentIdx], currentIdx);
        }

        function setCat(cat, btn) { 
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = cat; 
            updateUI(); 
        }

        // Boshlang'ich yuklash
        fetchM3U("https://raw.githubusercontent.com/iptv-free/TV/refs/heads/FREE/MP3LAR%20201-1000.m3u", "uzb");
        fetchM3U("https://raw.githubusercontent.com/iptv-free/TV/refs/heads/FREE/mp3bob%201000.m3u", "for");
    </script>
</body>
</html>
