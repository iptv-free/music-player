<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Music Player</title>
    <style>
        :root { --accent: #1db954; --bg: #fff; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding-bottom: 180px; }
        .header { padding: 15px; border-bottom: 1px solid #eee; text-align: center; }
        #search { width: 85%; padding: 12px; border-radius: 20px; border: 1px solid #ddd; }
        .menu { display: flex; justify-content: center; gap: 5px; margin: 10px 0; flex-wrap: wrap; }
        .menu-btn { padding: 8px 12px; border-radius: 20px; border: 1px solid var(--accent); background: #fff; cursor: pointer; }
        .menu-btn.active { background: var(--accent); color: white; }
        .song-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border-bottom: 1px solid #eee; }
        #footer-player { position: fixed; bottom: 0; width: 100%; background: #181818; color: white; padding: 15px; text-align: center; }
        .pagination { display: flex; justify-content: center; gap: 5px; margin: 20px 0; }
        .page-btn { padding: 8px 12px; border: 1px solid #ddd; cursor: pointer; }
        .page-btn.active { background: var(--accent); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <input type="text" id="search" placeholder="🔍 Qidirish..." onkeyup="updateUI()">
        <div class="menu">
            <button class="menu-btn active" onclick="setCat('all', this)">Barchasi</button>
            <button class="menu-btn" onclick="setCat('uzb', this)">O'zbek</button>
            <button class="menu-btn" onclick="setCat('for', this)">Xorij</button>
            <button class="menu-btn" onclick="showDownloaded()">💾 Yuklanganlar</button>
        </div>
    </div>

    <div id="playlist"></div>
    <div id="pagination" class="pagination"></div>

    <div id="footer-player">
        <h4 id="current-title" style="margin:5px;">Musiqa tanlang</h4>
        <audio id="audio" controls style="width: 90%"></audio>
    </div>

    <script>
        let allTracks = [], filtered = [], currentCat = 'all';
        const CORS_PROXY = "https://api.allorigins.win/raw?url=";
        const audio = document.getElementById('audio');

        async function fetchM3U(url, cat) {
            try {
                const res = await fetch(CORS_PROXY + encodeURIComponent(url));
                const text = await res.text();
                text.split('\n').forEach((line, i, arr) => {
                    if(line.startsWith('#EXTINF')) allTracks.push({ title: line.split(',')[1], url: arr[i+1], cat });
                });
                updateUI();
            } catch(e) { console.error(e); }
        }

        function openDB() {
            return new Promise(res => {
                const req = indexedDB.open("MusicDB", 1);
                req.onupgradeneeded = e => e.target.result.createObjectStore("mp3", { keyPath: "title" });
                req.onsuccess = e => res(e.target.result);
            });
        }

        async function download(url, title) {
            const res = await fetch(CORS_PROXY + encodeURIComponent(url));
            const blob = await res.blob();
            const db = await openDB();
            db.transaction("mp3", "readwrite").objectStore("mp3").put({ title, blob });
            alert(title + " saqlandi!");
        }

        async function showDownloaded() {
            const db = await openDB();
            db.transaction("mp3", "readonly").objectStore("mp3").getAll().onsuccess = e => {
                const list = document.getElementById('playlist');
                list.innerHTML = "<h3>💾 Yuklanganlar</h3>";
                e.target.result.forEach(t => {
                    const div = document.createElement('div');
                    div.className = 'song-item';
                    div.innerHTML = `<span>${t.title}</span> <button onclick="playBlob('${URL.createObjectURL(t.blob)}', '${t.title}')">▶️</button>`;
                    list.appendChild(div);
                });
            };
        }

        function playBlob(url, title) { audio.src = url; document.getElementById('current-title').innerText = title; audio.play(); }

        function updateUI() {
            const q = document.getElementById('search').value.toLowerCase();
            filtered = allTracks.filter(t => (currentCat === 'all' || t.cat === currentCat) && t.title.toLowerCase().includes(q));
            renderPage(1);
        }

        function renderPage(page) {
            const list = document.getElementById('playlist');
            list.innerHTML = "";
            filtered.slice((page-1)*20, page*20).forEach(t => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerHTML = `<span>${t.title}</span> 
                                 <button onclick="download('${t.url}', '${t.title}')">📥</button>
                                 <button onclick="audio.src='${t.url}'; document.getElementById('current-title').innerText='${t.title}'; audio.play()">▶️</button>`;
                list.appendChild(div);
            });
        }

        function setCat(cat, btn) {
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCat = cat;
            updateUI();
        }

        fetchM3U("https://raw.githubusercontent.com/iptv-free/TV/refs/heads/FREE/MP3LAR%20201-1000.m3u", "uzb");
        fetchM3U("https://raw.githubusercontent.com/iptv-free/TV/refs/heads/FREE/mp3bob%201000.m3u", "for");
    </script>
</body>
</html>
